<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">
<title>CMD Prevaler</title>
<meta name="theme-color" content="#ffffff">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,wght@0,400;0,500;0,600;0,700&family=DM+Serif+Display&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
html{height:100%}
body{
  font-family:'DM Sans',system-ui,sans-serif;
  min-height:100%;
  background:#fff;
  color:#1a1a2e;
  display:flex;
  align-items:center;
  justify-content:center;
  -webkit-font-smoothing:antialiased;
  padding:48px 0;
}

.page{width:100%;max-width:400px;padding:0 28px;text-align:center}

/* ===== AVATAR ===== */
.avatar{
  width:100px;height:100px;margin:0 auto 24px;
  border-radius:50%;overflow:hidden;
  background:#f5f5f5;
  box-shadow:0 2px 12px rgba(0,0,60,.08);
  animation:drop .55s cubic-bezier(.175,.885,.32,1.275) both;
}
.avatar img{width:100%;height:100%;object-fit:cover;display:block}
@keyframes drop{from{opacity:0;transform:translateY(-20px) scale(.85)}to{opacity:1;transform:none}}

/* ===== NAME ===== */
.name{
  font-family:'DM Serif Display',Georgia,serif;
  font-size:1.55rem;font-weight:400;
  color:#00005c;letter-spacing:.5px;
  margin-bottom:4px;
  animation:up .5s ease .08s both;
}
.tagline{
  font-size:.72rem;color:#999;
  font-weight:500;letter-spacing:2px;text-transform:uppercase;
  margin-bottom:8px;
  animation:up .5s ease .16s both;
}
.divider{
  width:32px;height:2px;
  background:linear-gradient(90deg,#ff7800,#ffaa44);
  border-radius:2px;margin:0 auto 32px;
  animation:up .5s ease .22s both;
}
@keyframes up{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:none}}

/* ===== BUTTONS ===== */
.btns{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:14px}

.btn{
  display:flex;flex-direction:column;align-items:center;gap:12px;
  padding:28px 14px 22px;
  border-radius:20px;border:1.5px solid #e8e8ee;
  background:#fff;
  text-decoration:none;color:#1a1a2e;
  transition:all .25s ease;
  -webkit-tap-highlight-color:transparent;
}
.btn:hover{
  border-color:#00005c;
  box-shadow:0 8px 28px rgba(0,0,60,.08);
  transform:translateY(-3px);
}
.btn:active{transform:translateY(0);box-shadow:none;transition-duration:.08s}

/* Icon pill */
.ico{
  width:52px;height:52px;border-radius:16px;
  display:flex;align-items:center;justify-content:center;
}
.ico.wa{background:#25d366}
.ico.wa svg{width:24px;height:24px;fill:#fff}
.ico.ph{background:#00005c}
.ico.ph svg{width:22px;height:22px;stroke:#fff;fill:none;stroke-width:2}

.btn .label{font-size:.92rem;font-weight:700;color:#1a1a2e}
.btn .meta{font-size:.64rem;color:#aaa;font-weight:500}

/* Stagger */
.btn:nth-child(1){animation:up .4s ease .3s both}
.btn:nth-child(2){animation:up .4s ease .4s both}

/* ===== INSTAGRAM ===== */
.ig{
  display:flex;align-items:center;gap:14px;
  padding:18px 22px;
  border-radius:16px;border:1.5px solid #e8e8ee;
  background:#fff;
  text-decoration:none;color:#1a1a2e;
  transition:all .25s ease;
  animation:up .4s ease .5s both;
  -webkit-tap-highlight-color:transparent;
}
.ig:hover{
  border-color:#dd2a7b;
  box-shadow:0 8px 28px rgba(221,42,123,.08);
  transform:translateY(-3px);
}
.ig:active{transform:translateY(0);box-shadow:none;transition-duration:.08s}

.ig-ico{
  width:44px;height:44px;border-radius:13px;flex-shrink:0;
  background:linear-gradient(135deg,#f58529,#dd2a7b,#8134af);
  display:flex;align-items:center;justify-content:center;
}
.ig-ico svg{width:22px;height:22px}

.ig-info{flex:1;text-align:left}
.ig-handle{font-size:.9rem;font-weight:700}
.ig-sub{font-size:.62rem;color:#aaa;margin-top:1px;font-weight:500}

.ig .chevron{
  width:28px;height:28px;border-radius:50%;
  background:#f5f5f5;
  display:flex;align-items:center;justify-content:center;
  transition:all .25s;
}
.ig:hover .chevron{background:#fce8f2;transform:translateX(2px)}
.chevron svg{width:11px;height:11px;stroke:#bbb;fill:none;stroke-width:2.5}
.ig:hover .chevron svg{stroke:#dd2a7b}

/* ===== FOOTER ===== */
.foot{
  margin-top:36px;
  font-size:.6rem;color:#ccc;
  letter-spacing:1.5px;text-transform:uppercase;
  animation:up .4s ease .6s both;
}

/* ===== RESPONSIVE ===== */
@media(max-width:420px){
  body{padding:36px 0}
  .page{padding:0 22px}
  .avatar{width:88px;height:88px;margin-bottom:20px}
  .name{font-size:1.4rem}
  .divider{margin-bottom:26px}
  .btn{padding:24px 12px 18px;border-radius:18px}
  .ico{width:46px;height:46px;border-radius:14px}
  .btn .label{font-size:.88rem}
  .ig{padding:16px 18px;border-radius:14px}
  .ig-ico{width:40px;height:40px;border-radius:11px}
}
@media(max-width:360px){
  .page{padding:0 18px}
  .avatar{width:76px;height:76px}
  .name{font-size:1.25rem}
  .btns{gap:10px}
  .btn{padding:20px 10px 16px;border-radius:16px}
  .ico{width:42px;height:42px;border-radius:12px}
  .ig{gap:12px;padding:14px 16px}
}
</style>
</head>
