<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">
<title>CMD Prevaler</title>
<meta name="theme-color" content="#0a0a1a">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;width:100%}
body{font-family:'Inter',system-ui,sans-serif;background:#0a0a1a;color:#fff;display:flex;align-items:center;justify-content:center;overflow:hidden;-webkit-font-smoothing:antialiased}

/* BG */
.bg{position:fixed;inset:0;z-index:0;overflow:hidden}
.bg::before{content:'';position:absolute;width:600px;height:600px;border-radius:50%;background:radial-gradient(circle,rgba(255,120,0,.06) 0%,transparent 70%);top:-20%;right:-15%;animation:drift 12s ease-in-out infinite alternate}
.bg::after{content:'';position:absolute;width:500px;height:500px;border-radius:50%;background:radial-gradient(circle,rgba(100,80,200,.04) 0%,transparent 70%);bottom:-20%;left:-10%;animation:drift 15s ease-in-out infinite alternate-reverse}
@keyframes drift{0%{transform:translate(0,0)}100%{transform:translate(15px,-10px)}}

.page{position:relative;z-index:1;width:100%;max-width:380px;padding:0 24px;text-align:center}

/* AVATAR */
.avatar{width:80px;height:80px;margin:0 auto 20px;border-radius:50%;background:linear-gradient(135deg,#1a1a3e,#2a2a5e);border:2px solid rgba(255,255,255,.08);display:flex;align-items:center;justify-content:center;animation:pop .5s cubic-bezier(.175,.885,.32,1.275) both}
.avatar svg{width:36px;height:36px}
@keyframes pop{from{opacity:0;transform:scale(.6)}to{opacity:1;transform:scale(1)}}

.name{font-size:1.1rem;font-weight:700;letter-spacing:1px;margin-bottom:3px;animation:fadeIn .5s ease .15s both}
.subtitle{font-size:.7rem;color:rgba(255,255,255,.35);font-weight:500;letter-spacing:2px;text-transform:uppercase;margin-bottom:36px;animation:fadeIn .5s ease .25s both}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}

/* WA BUTTONS */
.wa-row{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:16px}
.wa-card{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px;padding:24px 16px;border-radius:20px;text-decoration:none;color:#fff;transition:all .3s ease;position:relative;overflow:hidden}
.wa-card::before{content:'';position:absolute;inset:0;border-radius:20px;border:1px solid transparent;transition:border-color .3s}

.wa-card.msg{background:linear-gradient(160deg,rgba(37,211,102,.12) 0%,rgba(37,211,102,.04) 100%)}
.wa-card.msg::before{border-color:rgba(37,211,102,.2)}
.wa-card.msg:hover{transform:translateY(-3px);box-shadow:0 12px 32px rgba(37,211,102,.12)}
.wa-card.msg:hover::before{border-color:rgba(37,211,102,.4)}

.wa-card.call{background:linear-gradient(160deg,rgba(37,211,102,.12) 0%,rgba(37,211,102,.04) 100%)}
.wa-card.call::before{border-color:rgba(37,211,102,.2)}
.wa-card.call:hover{transform:translateY(-3px);box-shadow:0 12px 32px rgba(37,211,102,.12)}
.wa-card.call:hover::before{border-color:rgba(37,211,102,.4)}

.wa-card:active{transform:translateY(0)!important;transition-duration:.1s}

.wa-icon{width:44px;height:44px;border-radius:50%;display:flex;align-items:center;justify-content:center}
.wa-card.msg .wa-icon{background:rgba(37,211,102,.15)}
.wa-card.call .wa-icon{background:rgba(37,211,102,.15)}
.wa-icon svg{width:22px;height:22px}

.wa-card .label{font-size:.9rem;font-weight:600;letter-spacing:.3px}
.wa-card .meta{font-size:.65rem;color:rgba(255,255,255,.3);font-weight:400}

/* Stagger */
.wa-card.msg{animation:fadeIn .4s ease .35s both}
.wa-card.call{animation:fadeIn .4s ease .45s both}

/* IG BUTTON */
.ig-link{display:flex;align-items:center;gap:14px;padding:16px 20px;border-radius:16px;text-decoration:none;color:#fff;background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.06);transition:all .3s ease;animation:fadeIn .4s ease .55s both}
.ig-link:hover{background:rgba(255,255,255,.06);border-color:rgba(255,255,255,.12);transform:translateY(-2px);box-shadow:0 8px 24px rgba(0,0,0,.15)}
.ig-link:active{transform:translateY(0);transition-duration:.1s}

.ig-icon{width:40px;height:40px;border-radius:12px;background:linear-gradient(135deg,#f58529,#dd2a7b,#8134af);display:flex;align-items:center;justify-content:center;flex-shrink:0}
.ig-icon svg{width:20px;height:20px;fill:#fff}

.ig-info{flex:1;text-align:left}
.ig-handle{font-size:.88rem;font-weight:600}
.ig-sub{font-size:.65rem;color:rgba(255,255,255,.3);font-weight:400;margin-top:1px}

.ig-arrow{width:28px;height:28px;border-radius:50%;background:rgba(255,255,255,.04);display:flex;align-items:center;justify-content:center;transition:all .3s}
.ig-link:hover .ig-arrow{background:rgba(255,255,255,.08);transform:translateX(2px)}
.ig-arrow svg{width:12px;height:12px;stroke:rgba(255,255,255,.3);fill:none;stroke-width:2.5}

/* FOOTER */
.foot{margin-top:32px;font-size:.6rem;color:rgba(255,255,255,.12);letter-spacing:1.5px;text-transform:uppercase;animation:fadeIn .4s ease .65s both}

/* RESPONSIVE */
@media(max-width:400px){
  .page{padding:0 20px}
  .avatar{width:68px;height:68px}
  .avatar svg{width:30px;height:30px}
  .name{font-size:1rem}
  .subtitle{margin-bottom:28px}
  .wa-card{padding:20px 12px;border-radius:16px}
  .wa-icon{width:38px;height:38px}
  .wa-icon svg{width:18px;height:18px}
  .wa-card .label{font-size:.84rem}
  .ig-link{padding:14px 16px}
  .ig-icon{width:36px;height:36px;border-radius:10px}
}
@media(max-width:340px){
  .wa-row{gap:8px}
  .wa-card{padding:16px 10px;border-radius:14px}
  .name{font-size:.92rem}
  .ig-link{gap:10px;padding:12px 14px}
}
</style>
</head>
<body>
