<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">
<title>CMD Prevaler</title>
<meta name="theme-color" content="#080818">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;width:100%}
body{
  font-family:'Inter',system-ui,sans-serif;
  background:#080818;
  color:#fff;
  display:flex;
  align-items:center;
  justify-content:center;
  overflow:hidden;
  -webkit-font-smoothing:antialiased;
  -moz-osx-font-smoothing:grayscale;
}

/* ===== BACKGROUND ===== */
.scene{position:fixed;inset:0;z-index:0;overflow:hidden}
.scene .glow{position:absolute;border-radius:50%;filter:blur(60px);pointer-events:none}
.scene .g1{width:300px;height:300px;background:rgba(255,120,0,.07);top:-5%;right:-8%;animation:float 10s ease-in-out infinite alternate}
.scene .g2{width:250px;height:250px;background:rgba(60,60,180,.05);bottom:-8%;left:-5%;animation:float 13s ease-in-out infinite alternate-reverse}
@keyframes float{0%{transform:translate(0,0) scale(1)}100%{transform:translate(12px,-8px) scale(1.05)}}

/* ===== CONTAINER ===== */
.wrap{position:relative;z-index:1;width:100%;max-width:380px;padding:0 24px;text-align:center}

/* ===== AVATAR ===== */
.avatar{
  width:96px;height:96px;margin:0 auto 22px;
  border-radius:50%;
  overflow:hidden;
  border:2.5px solid rgba(255,255,255,.1);
  box-shadow:0 0 0 4px rgba(255,120,0,.08),0 12px 40px rgba(0,0,0,.4);
  animation:avatarIn .6s cubic-bezier(.175,.885,.32,1.275) both;
  background:#1a1a2e;
}
.avatar img{width:100%;height:100%;object-fit:cover;display:block}
@keyframes avatarIn{from{opacity:0;transform:scale(.5) translateY(20px)}to{opacity:1;transform:scale(1) translateY(0)}}

/* ===== NAME ===== */
.name{font-size:1.2rem;font-weight:800;letter-spacing:1.5px;margin-bottom:4px;animation:slideUp .5s ease .1s both}
.tagline{font-size:.68rem;color:rgba(255,255,255,.3);font-weight:500;letter-spacing:2.5px;text-transform:uppercase;margin-bottom:40px;animation:slideUp .5s ease .2s both}
@keyframes slideUp{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}

/* ===== 3D BUTTONS ===== */
.btn-row{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:18px}

.btn3d{
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px;
  padding:28px 16px 22px;
  border-radius:22px;
  text-decoration:none;color:#fff;
  position:relative;
  transition:transform .25s cubic-bezier(.25,.46,.45,.94),box-shadow .25s;
  cursor:pointer;
  -webkit-tap-highlight-color:transparent;
  /* 3D depth */
  transform-style:preserve-3d;
  perspective:600px;
}
.btn3d:active{transform:translateY(2px) scale(.97)!important;box-shadow:none!important;transition-duration:.08s}

/* WhatsApp Message */
.btn3d.wa-msg{
  background:linear-gradient(165deg,#1a3d2a 0%,#0d2218 100%);
  border:1px solid rgba(37,211,102,.2);
  box-shadow:
    0 6px 0 0 #0a1a10,
    0 8px 24px rgba(37,211,102,.1),
    inset 0 1px 0 rgba(255,255,255,.06);
}
.btn3d.wa-msg:hover{
  transform:translateY(-3px);
  box-shadow:
    0 10px 0 0 #0a1a10,
    0 16px 40px rgba(37,211,102,.18),
    inset 0 1px 0 rgba(255,255,255,.08);
}

/* WhatsApp Call */
.btn3d.wa-call{
  background:linear-gradient(165deg,#1a3d2a 0%,#0d2218 100%);
  border:1px solid rgba(37,211,102,.2);
  box-shadow:
    0 6px 0 0 #0a1a10,
    0 8px 24px rgba(37,211,102,.1),
    inset 0 1px 0 rgba(255,255,255,.06);
}
.btn3d.wa-call:hover{
  transform:translateY(-3px);
  box-shadow:
    0 10px 0 0 #0a1a10,
    0 16px 40px rgba(37,211,102,.18),
    inset 0 1px 0 rgba(255,255,255,.08);
}

/* Icon circle */
.btn-icon{
  width:48px;height:48px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  position:relative;
}
.btn-icon.green{background:radial-gradient(circle at 40% 35%,#34e06a,#1fba52)}
.btn-icon.green::after{
  content:'';position:absolute;
  width:20px;height:8px;border-radius:50%;
  background:rgba(255,255,255,.25);
  top:10px;left:50%;transform:translateX(-50%);
  filter:blur(2px);
}
.btn-icon svg{width:22px;height:22px;position:relative;z-index:1}

.btn3d .lbl{font-size:.95rem;font-weight:700;letter-spacing:.3px}
.btn3d .sub{font-size:.62rem;color:rgba(255,255,255,.3);font-weight:400;letter-spacing:.3px}

/* Stagger */
.btn3d.wa-msg{animation:slideUp .45s ease .3s both}
.btn3d.wa-call{animation:slideUp .45s ease .42s both}

/* ===== INSTAGRAM 3D ===== */
.ig-btn{
  display:flex;align-items:center;gap:16px;
  padding:18px 22px;
  border-radius:18px;
  text-decoration:none;color:#fff;
  position:relative;
  transition:transform .25s cubic-bezier(.25,.46,.45,.94),box-shadow .25s;
  cursor:pointer;
  -webkit-tap-highlight-color:transparent;
  background:linear-gradient(165deg,#2a1835 0%,#18101e 100%);
  border:1px solid rgba(221,42,123,.15);
  box-shadow:
    0 6px 0 0 #0e0812,
    0 8px 24px rgba(221,42,123,.08),
    inset 0 1px 0 rgba(255,255,255,.04);
  animation:slideUp .45s ease .54s both;
}
.ig-btn:hover{
  transform:translateY(-3px);
  box-shadow:
    0 10px 0 0 #0e0812,
    0 16px 40px rgba(221,42,123,.15),
    inset 0 1px 0 rgba(255,255,255,.06);
}
.ig-btn:active{transform:translateY(2px) scale(.97)!important;box-shadow:none!important;transition-duration:.08s}

.ig-icon{
  width:44px;height:44px;border-radius:13px;
  background:linear-gradient(135deg,#f58529 0%,#dd2a7b 50%,#8134af 100%);
  display:flex;align-items:center;justify-content:center;flex-shrink:0;
  position:relative;
  box-shadow:0 4px 12px rgba(221,42,123,.25);
}
.ig-icon::after{
  content:'';position:absolute;
  width:18px;height:6px;border-radius:50%;
  background:rgba(255,255,255,.2);
  top:8px;left:50%;transform:translateX(-50%);
  filter:blur(2px);
}
.ig-icon svg{width:22px;height:22px;position:relative;z-index:1}

.ig-info{flex:1;text-align:left}
.ig-handle{font-size:.92rem;font-weight:700;letter-spacing:.2px}
.ig-sub{font-size:.62rem;color:rgba(255,255,255,.3);margin-top:2px}

.ig-chevron{
  width:30px;height:30px;border-radius:50%;
  background:rgba(255,255,255,.04);
  display:flex;align-items:center;justify-content:center;
  transition:all .3s;
}
.ig-btn:hover .ig-chevron{background:rgba(255,255,255,.08);transform:translateX(3px)}
.ig-chevron svg{width:12px;height:12px;stroke:rgba(255,255,255,.3);fill:none;stroke-width:2.5}

/* ===== FOOTER ===== */
.foot{margin-top:36px;font-size:.58rem;color:rgba(255,255,255,.1);letter-spacing:2px;text-transform:uppercase;animation:slideUp .4s ease .66s both}

/* ===== RESPONSIVE ===== */
@media(max-width:420px){
  .wrap{padding:0 20px}
  .avatar{width:84px;height:84px}
  .name{font-size:1.1rem}
  .tagline{margin-bottom:32px}
  .btn3d{padding:24px 12px 18px;border-radius:18px}
  .btn-icon{width:42px;height:42px}
  .btn-icon svg{width:20px;height:20px}
  .btn3d .lbl{font-size:.88rem}
  .ig-btn{padding:16px 18px;border-radius:16px}
  .ig-icon{width:40px;height:40px;border-radius:11px}
}
@media(max-width:360px){
  .wrap{padding:0 16px}
  .avatar{width:72px;height:72px}
  .name{font-size:1rem;letter-spacing:1px}
  .tagline{margin-bottom:26px;font-size:.6rem}
  .btn-row{gap:10px}
  .btn3d{padding:20px 10px 16px;border-radius:16px}
  .btn-icon{width:38px;height:38px}
  .btn3d .lbl{font-size:.82rem}
  .ig-btn{gap:12px;padding:14px 16px}
}
</style>
</head>
