<style>
*{margin:0;padding:0;box-sizing:border-box}

:root{
  --navy:#00005c;
  --orange:#ff7800;
  --white:#ffffff;
  --gray-light:#f7f7fa;
  --gray-text:#555;
}

body{
  font-family:Georgia,'Times New Roman',serif;
  min-height:100dvh;
  display:flex;
  align-items:center;
  justify-content:center;
  background:var(--white);
  overflow-x:hidden;
  position:relative;
}

/* === CSS-ONLY MEDICAL BACKGROUND ANIMATIONS === */

/* Heartbeat pulse line */
.heartbeat-line{
  position:fixed;
  bottom:12%;
  left:0;
  width:200%;
  height:60px;
  opacity:0.06;
  z-index:0;
  overflow:hidden;
}
.heartbeat-line svg{
  animation:heartbeat-scroll 8s linear infinite;
}
@keyframes heartbeat-scroll{
  0%{transform:translateX(0)}
  100%{transform:translateX(-50%)}
}

/* Floating medical crosses */
.float-cross{
  position:fixed;
  opacity:0.04;
  z-index:0;
  color:var(--navy);
  font-size:28px;
  font-weight:300;
  animation:float-up 12s ease-in-out infinite;
}
.float-cross:nth-child(1){left:8%;top:15%;animation-delay:0s;font-size:22px}
.float-cross:nth-child(2){right:12%;top:30%;animation-delay:3s;font-size:34px}
.float-cross:nth-child(3){left:20%;bottom:25%;animation-delay:6s;font-size:18px}
.float-cross:nth-child(4){right:25%;top:60%;animation-delay:9s;font-size:26px}
.float-cross:nth-child(5){left:50%;top:8%;animation-delay:2s;font-size:20px}

@keyframes float-up{
  0%,100%{transform:translateY(0) rotate(0deg);opacity:0.04}
  50%{transform:translateY(-18px) rotate(8deg);opacity:0.07}
}

/* Soft radial glow */
.glow{
  position:fixed;
  width:300px;height:300px;
  border-radius:50%;
  background:radial-gradient(circle,rgba(0,0,92,0.03) 0%,transparent 70%);
  z-index:0;
  animation:glow-pulse 6s ease-in-out infinite;
}
.glow-1{top:-80px;right:-60px;animation-delay:0s}
.glow-2{bottom:-80px;left:-60px;animation-delay:3s}

@keyframes glow-pulse{
  0%,100%{transform:scale(1);opacity:0.5}
  50%{transform:scale(1.15);opacity:1}
}

/* === MAIN CARD === */

.card{
  position:relative;
  z-index:1;
  width:92%;
  max-width:380px;
  padding:40px 28px 36px;
  text-align:center;
  background:var(--white);
  border:1px solid rgba(0,0,92,0.08);
  border-radius:20px;
  box-shadow:0 4px 30px rgba(0,0,92,0.06);
}

/* Logo */
.logo{
  width:90px;
  height:90px;
  border-radius:50%;
  object-fit:cover;
  margin-bottom:16px;
  border:2px solid rgba(0,0,92,0.1);
}

/* Title */
.card h1{
  font-size:1.4rem;
  font-weight:700;
  color:var(--navy);
  letter-spacing:0.02em;
  margin-bottom:4px;
  font-family:Georgia,'Times New Roman',serif;
}

.card .tagline{
  font-size:0.82rem;
  color:var(--gray-text);
  margin-bottom:28px;
  font-style:italic;
  line-height:1.4;
}

/* Buttons */
.btn-row{
  display:flex;
  gap:10px;
  margin-bottom:12px;
}

.btn{
  display:flex;
  align-items:center;
  justify-content:center;
  gap:8px;
  flex:1;
  padding:14px 10px;
  border-radius:12px;
  text-decoration:none;
  font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;
  font-size:0.85rem;
  font-weight:600;
  transition:transform 0.2s ease, box-shadow 0.2s ease;
  cursor:pointer;
  border:none;
}

.btn:active{
  transform:scale(0.97);
}

/* WhatsApp buttons */
.btn-wa{
  background:#25D366;
  color:#fff;
}
.btn-wa:hover{
  box-shadow:0 4px 14px rgba(37,211,102,0.35);
  transform:translateY(-1px);
}

/* Telegram buttons */
.btn-tg{
  background:#2AABEE;
  color:#fff;
}
.btn-tg:hover{
  box-shadow:0 4px 14px rgba(42,171,238,0.35);
  transform:translateY(-1px);
}

/* Instagram button */
.btn-ig{
  background:linear-gradient(135deg,#833AB4,#E1306C,#F77737);
  color:#fff;
  width:100%;
  padding:14px;
  margin-bottom:0;
}
.btn-ig:hover{
  box-shadow:0 4px 14px rgba(225,48,108,0.35);
  transform:translateY(-1px);
}

/* Section label */
.section-label{
  font-size:0.7rem;
  text-transform:uppercase;
  letter-spacing:0.12em;
  color:var(--gray-text);
  margin:6px 0 10px;
  font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;
}

/* Divider */
.divider{
  width:40px;
  height:1px;
  background:rgba(0,0,92,0.1);
  margin:18px auto;
}

/* Footer */
.footer{
  margin-top:22px;
  font-size:0.68rem;
  color:#aaa;
  font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;
}

/* SVG icons inside buttons */
.btn svg{
  width:18px;
  height:18px;
  flex-shrink:0;
}
</style>
