<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">
<title>CMD Prevaler</title>
<meta name="theme-color" content="#00005c">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=DM+Serif+Display&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;width:100%}
body{
  font-family:'DM Sans',system-ui,sans-serif;
  color:#fff;
  -webkit-font-smoothing:antialiased;
  overflow:hidden;
}

/* ===== BG ===== */
.bg{
  position:fixed;inset:0;z-index:0;
  background:linear-gradient(175deg,#00003a 0%,#000028 40%,#00004e 100%);
}

/* ===== LAYOUT ===== */
.page{
  position:relative;z-index:1;
  width:100%;height:100vh;height:100dvh;
  display:flex;align-items:center;justify-content:center;
  padding:24px;
}

.card{
  width:100%;max-width:360px;
  padding:40px 28px 32px;
  border-radius:28px;
  background:rgba(255,255,255,.08);
  backdrop-filter:blur(40px) saturate(150%);
  -webkit-backdrop-filter:blur(40px) saturate(150%);
  border:1px solid rgba(255,255,255,.12);
  box-shadow:0 24px 80px rgba(0,0,0,.3);
  text-align:center;
  animation:cardIn .6s cubic-bezier(.22,1,.36,1) both;
}
@keyframes cardIn{from{opacity:0;transform:translateY(30px) scale(.96)}to{opacity:1;transform:none}}

/* ===== AVATAR ===== */
.avatar{
  width:88px;height:88px;margin:0 auto 20px;
  border-radius:50%;overflow:hidden;
  border:3px solid rgba(255,255,255,.15);
  box-shadow:0 4px 20px rgba(0,0,0,.2);
  animation:popIn .5s cubic-bezier(.175,.885,.32,1.275) .15s both;
}
.avatar img{width:100%;height:100%;object-fit:cover}
@keyframes popIn{from{opacity:0;transform:scale(.6)}to{opacity:1;transform:scale(1)}}

/* ===== TEXT ===== */
.name{
  font-family:'DM Serif Display',serif;
  font-size:1.45rem;font-weight:400;
  letter-spacing:.5px;
  margin-bottom:3px;
  animation:fadeUp .45s ease .25s both;
}
.sub{
  font-size:.68rem;color:rgba(255,255,255,.45);
  font-weight:500;letter-spacing:2px;text-transform:uppercase;
  animation:fadeUp .45s ease .32s both;
}
.line{
  width:28px;height:1.5px;margin:16px auto 28px;
  background:linear-gradient(90deg,transparent,#ff7800,transparent);
  border-radius:1px;
  animation:fadeUp .45s ease .38s both;
}
@keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:none}}

/* ===== BUTTONS ===== */
.btns{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:14px}

.b{
  display:flex;flex-direction:column;align-items:center;gap:10px;
  padding:24px 12px 18px;
  border-radius:18px;
  background:rgba(255,255,255,.06);
  border:1px solid rgba(255,255,255,.1);
  text-decoration:none;color:#fff;
  transition:all .3s ease;
  -webkit-tap-highlight-color:transparent;
}
.b:hover{
  background:rgba(255,255,255,.12);
  border-color:rgba(255,255,255,.2);
  transform:translateY(-3px);
  box-shadow:0 8px 24px rgba(0,0,0,.15);
}
.b:active{transform:translateY(0);box-shadow:none;transition-duration:.08s}

.b .ic{
  width:48px;height:48px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  transition:transform .3s;
}
.b:hover .ic{transform:scale(1.05)}
.b .ic.green{background:#25d366;box-shadow:0 4px 16px rgba(37,211,102,.25)}
.b .ic.navy{background:#ff7800;box-shadow:0 4px 16px rgba(255,120,0,.2)}
.b .ic svg{width:22px;height:22px}

.b .lbl{font-size:.88rem;font-weight:700}
.b .mt{font-size:.6rem;color:rgba(255,255,255,.35);font-weight:500}

.b:nth-child(1){animation:fadeUp .4s ease .44s both}
.b:nth-child(2){animation:fadeUp .4s ease .52s both}

/* ===== INSTAGRAM ===== */
.ig{
  display:flex;align-items:center;gap:14px;
  padding:16px 20px;
  border-radius:16px;
  background:rgba(255,255,255,.06);
  border:1px solid rgba(255,255,255,.1);
  text-decoration:none;color:#fff;
  transition:all .3s ease;
  animation:fadeUp .4s ease .6s both;
  -webkit-tap-highlight-color:transparent;
}
.ig:hover{
  background:rgba(255,255,255,.12);
  border-color:rgba(255,255,255,.2);
  transform:translateY(-3px);
  box-shadow:0 8px 24px rgba(0,0,0,.15);
}
.ig:active{transform:translateY(0);box-shadow:none;transition-duration:.08s}

.ig-ic{
  width:42px;height:42px;border-radius:12px;flex-shrink:0;
  background:linear-gradient(135deg,#f58529,#dd2a7b,#8134af);
  display:flex;align-items:center;justify-content:center;
  box-shadow:0 4px 14px rgba(221,42,123,.2);
  transition:transform .3s;
}
.ig:hover .ig-ic{transform:scale(1.05)}
.ig-ic svg{width:20px;height:20px}

.ig-t{flex:1;text-align:left}
.ig-h{font-size:.88rem;font-weight:700}
.ig-s{font-size:.6rem;color:rgba(255,255,255,.35);margin-top:1px;font-weight:500}

.ig .arr{
  width:26px;height:26px;border-radius:50%;
  background:rgba(255,255,255,.06);
  display:flex;align-items:center;justify-content:center;
  transition:all .3s;
}
.ig:hover .arr{background:rgba(255,255,255,.12);transform:translateX(2px)}
.arr svg{width:10px;height:10px;stroke:rgba(255,255,255,.35);fill:none;stroke-width:2.5}

/* ===== FOOTER ===== */
.ft{
  margin-top:24px;
  font-size:.55rem;color:rgba(255,255,255,.2);
  letter-spacing:2px;text-transform:uppercase;
  animation:fadeUp .4s ease .68s both;
}

/* ===== RESPONSIVE ===== */
@media(max-width:420px){
  .card{padding:32px 22px 26px;border-radius:24px}
  .avatar{width:76px;height:76px;margin-bottom:16px}
  .name{font-size:1.3rem}
  .line{margin:14px auto 22px}
  .b{padding:20px 10px 16px;border-radius:16px}
  .b .ic{width:44px;height:44px}
  .b .ic svg{width:20px;height:20px}
  .b .lbl{font-size:.84rem}
  .ig{padding:14px 16px;border-radius:14px}
  .ig-ic{width:38px;height:38px;border-radius:11px}
}
@media(max-width:360px){
  .page{padding:16px}
  .card{padding:28px 18px 22px;border-radius:22px}
  .avatar{width:68px;height:68px}
  .name{font-size:1.15rem}
  .btns{gap:10px}
  .b{padding:18px 8px 14px;border-radius:14px}
  .b .ic{width:40px;height:40px}
  .b .lbl{font-size:.8rem}
  .ig{gap:10px;padding:12px 14px;border-radius:12px}
  .ig-ic{width:36px;height:36px;border-radius:10px}
}

/* ===== SUBTLE AMBIENT ANIMATION ===== */
@keyframes breathe{0%,100%{opacity:.08}50%{opacity:.12}}
.card::before{
  content:'';position:absolute;
  top:-1px;left:20%;right:20%;height:1px;
  background:linear-gradient(90deg,transparent,rgba(255,255,255,.3),transparent);
  border-radius:1px;
  animation:breathe 4s ease-in-out infinite;
}
.card{position:relative;overflow:hidden}
</style>
