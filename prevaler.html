<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">
<title>CMD Prevaler</title>
<meta name="theme-color" content="#f0f4f8">
<style>
@import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=DM+Serif+Display&display=swap');
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;width:100%;overflow:hidden}
body{
  font-family:'DM Sans',system-ui,-apple-system,sans-serif;
  background:#f0f4f8;
  color:#1a1a2e;
  display:flex;align-items:center;justify-content:center;
  -webkit-font-smoothing:antialiased;
}

/* ===== ANIMATED BACKGROUND ===== */
.scene{position:fixed;inset:0;z-index:0;overflow:hidden;background:linear-gradient(160deg,#f0f4f8 0%,#e8eef5 50%,#f5f7fa 100%)}

/* Floating medical crosses */
.float-el{position:absolute;opacity:.06;animation:floatUp linear infinite}
.float-el svg{width:100%;height:100%}
.f1{width:30px;height:30px;left:10%;animation-duration:18s;animation-delay:0s}
.f2{width:22px;height:22px;left:25%;animation-duration:22s;animation-delay:-4s}
.f3{width:36px;height:36px;left:45%;animation-duration:20s;animation-delay:-8s}
.f4{width:26px;height:26px;left:65%;animation-duration:24s;animation-delay:-2s}
.f5{width:20px;height:20px;left:80%;animation-duration:19s;animation-delay:-10s}
.f6{width:32px;height:32px;left:35%;animation-duration:21s;animation-delay:-14s}
.f7{width:24px;height:24px;left:55%;animation-duration:23s;animation-delay:-6s}
.f8{width:28px;height:28px;left:90%;animation-duration:17s;animation-delay:-12s}
@keyframes floatUp{
  0%{transform:translateY(110vh) rotate(0deg);opacity:.04}
  50%{opacity:.08}
  100%{transform:translateY(-10vh) rotate(180deg);opacity:.04}
}

/* Heartbeat line */
.heartbeat{position:absolute;bottom:30%;left:0;width:200%;height:60px;opacity:.04;animation:slideLeft 8s linear infinite}
@keyframes slideLeft{0%{transform:translateX(0)}100%{transform:translateX(-50%)}}

/* Walking silhouettes */
.walker{position:absolute;bottom:12%;opacity:.035;animation:walk linear infinite}
.w1{animation-duration:25s;animation-delay:0s}
.w2{animation-duration:30s;animation-delay:-12s}
.w3{animation-duration:22s;animation-delay:-6s}
@keyframes walk{0%{transform:translateX(-80px)}100%{transform:translateX(calc(100vw + 80px))}}
.walker svg{width:40px;height:80px}

/* ===== CARD ===== */
.page{position:relative;z-index:1;width:100%;max-width:380px;padding:0 24px}

.card{
  padding:40px 28px 32px;
  border-radius:28px;
  background:rgba(255,255,255,.85);
  backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
  border:1px solid rgba(255,255,255,.9);
  box-shadow:0 4px 40px rgba(0,0,60,.06),0 1px 3px rgba(0,0,60,.04);
  text-align:center;
  animation:cardIn .55s cubic-bezier(.22,1,.36,1) both;
  position:relative;
}
@keyframes cardIn{from{opacity:0;transform:translateY(24px) scale(.97)}to{opacity:1;transform:none}}

/* Top accent line */
.card::before{
  content:'';position:absolute;
  top:-1px;left:15%;right:15%;height:3px;
  background:linear-gradient(90deg,transparent,#ff7800,transparent);
  border-radius:0 0 3px 3px;
}

/* ===== AVATAR ===== */
.avatar{
  width:88px;height:88px;margin:0 auto 18px;
  border-radius:50%;overflow:hidden;
  border:3px solid #fff;
  box-shadow:0 4px 20px rgba(0,0,60,.08);
  animation:popIn .5s cubic-bezier(.175,.885,.32,1.275) .1s both;
}
.avatar img{width:100%;height:100%;object-fit:cover;display:block}
@keyframes popIn{from{opacity:0;transform:scale(.5)}to{opacity:1;transform:scale(1)}}

/* ===== TEXT ===== */
.name{
  font-family:'DM Serif Display',Georgia,'Times New Roman',serif;
  font-size:1.4rem;font-weight:400;
  color:#00005c;letter-spacing:.5px;
  margin-bottom:3px;
  animation:up .45s ease .2s both;
}
.sub{
  font-size:.68rem;color:#8a8aa0;
  font-weight:500;letter-spacing:2px;text-transform:uppercase;
  animation:up .45s ease .28s both;
}
.accent{
  width:28px;height:2px;margin:14px auto 26px;
  background:#ff7800;border-radius:2px;
  animation:up .45s ease .35s both;
}
@keyframes up{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:none}}

/* ===== BUTTONS ===== */
.btns{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:14px}
.b{
  display:flex;flex-direction:column;align-items:center;gap:10px;
  padding:24px 12px 18px;
  border-radius:18px;
  background:#fff;
  border:1.5px solid #eaedf2;
  text-decoration:none;color:#1a1a2e;
  transition:all .25s ease;
  -webkit-tap-highlight-color:transparent;
}
.b:hover{border-color:#00005c;transform:translateY(-3px);box-shadow:0 8px 24px rgba(0,0,60,.07)}
.b:active{transform:translateY(0);box-shadow:none;transition-duration:.08s}

.b .ic{
  width:48px;height:48px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  transition:transform .25s;
}
.b:hover .ic{transform:scale(1.06)}
.b .ic svg{width:22px;height:22px}
.ic.green{background:#25d366;box-shadow:0 4px 12px rgba(37,211,102,.2)}
.ic.orange{background:#ff7800;box-shadow:0 4px 12px rgba(255,120,0,.2)}

.b .lbl{font-size:.88rem;font-weight:700;color:#1a1a2e}
.b .mt{font-size:.6rem;color:#aaa;font-weight:500}
.b:nth-child(1){animation:up .4s ease .42s both}
.b:nth-child(2){animation:up .4s ease .5s both}

/* ===== INSTAGRAM ===== */
.ig{
  display:flex;align-items:center;gap:14px;
  padding:16px 20px;border-radius:16px;
  background:#fff;border:1.5px solid #eaedf2;
  text-decoration:none;color:#1a1a2e;
  transition:all .25s ease;
  animation:up .4s ease .58s both;
  -webkit-tap-highlight-color:transparent;
}
.ig:hover{border-color:#dd2a7b;transform:translateY(-3px);box-shadow:0 8px 24px rgba(221,42,123,.06)}
.ig:active{transform:translateY(0);box-shadow:none;transition-duration:.08s}

.ig-ic{
  width:42px;height:42px;border-radius:12px;flex-shrink:0;
  background:linear-gradient(135deg,#f58529,#dd2a7b,#8134af);
  display:flex;align-items:center;justify-content:center;
  box-shadow:0 4px 12px rgba(221,42,123,.15);
  transition:transform .25s;
}
.ig:hover .ig-ic{transform:scale(1.06)}
.ig-ic svg{width:20px;height:20px}

.ig-t{flex:1;text-align:left}
.ig-h{font-size:.88rem;font-weight:700}
.ig-s{font-size:.6rem;color:#aaa;margin-top:1px;font-weight:500}

.ig .chv{
  width:26px;height:26px;border-radius:50%;background:#f5f5f8;
  display:flex;align-items:center;justify-content:center;transition:all .25s;
}
.ig:hover .chv{background:#fce8f2;transform:translateX(2px)}
.chv svg{width:10px;height:10px;stroke:#bbb;fill:none;stroke-width:2.5}
.ig:hover .chv svg{stroke:#dd2a7b}

/* ===== FOOTER ===== */
.ft{margin-top:22px;font-size:.55rem;color:#ccc;letter-spacing:2px;text-transform:uppercase;animation:up .4s ease .66s both}

/* ===== RESPONSIVE ===== */
@media(max-width:420px){
  .card{padding:32px 22px 26px;border-radius:24px}
  .avatar{width:76px;height:76px}
  .name{font-size:1.25rem}
  .accent{margin:12px auto 22px}
  .b{padding:20px 10px 16px;border-radius:16px}
  .b .ic{width:44px;height:44px}
  .b .lbl{font-size:.84rem}
  .ig{padding:14px 16px;border-radius:14px}
  .ig-ic{width:38px;height:38px;border-radius:10px}
}
@media(max-width:360px){
  .page{padding:0 18px}
  .card{padding:26px 18px 22px;border-radius:22px}
  .avatar{width:68px;height:68px}
  .name{font-size:1.15rem}
  .btns{gap:10px}
  .b{padding:18px 8px 14px;border-radius:14px}
  .b .ic{width:40px;height:40px}
  .ig{gap:10px;padding:12px 14px;border-radius:12px}
  .ig-ic{width:36px;height:36px}
}
</style>
